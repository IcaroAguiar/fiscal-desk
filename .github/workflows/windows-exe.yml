name: Desktop unsigned builds

concurrency:
  group: desktop-unsigned-builds-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-desktop:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64 unsigned
            os: windows-latest
            package-command: pnpm dist:win
            artifact-name: fiscal-desk-windows-x64
            artifact-path: |
              release/*.exe
              release/*.yml
              release/*.blockmap
          - name: macOS unsigned DMG
            os: macos-latest
            package-command: pnpm dist:mac
            artifact-name: fiscal-desk-macos
            artifact-path: |
              release/*.dmg
              release/*.zip
              release/*.yml
              release/*.blockmap

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Deterministic E2E
        env:
          FISCAL_DESK_E2E_OUTPUT_DIR: docs/qa/e2e-artifacts
        run: pnpm test:e2e

      - name: Package desktop app
        run: ${{ matrix.package-command }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload E2E artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.artifact-name }}-e2e
          retention-days: 7
          path: |
            docs/qa/e2e-artifacts/**
