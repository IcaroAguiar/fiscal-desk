appId: com.icaroaguiar.fiscal-desk
productName: Fiscal Desk
directories:
  output: release
files:
  - dist/**
  - dist-electron/**
  - package.json
asar: true
asarUnpack:
  - "node_modules/.pnpm/playwright-core@*/node_modules/playwright-core/**/*"
mac:
  target:
    - dmg
win:
  target:
    - nsis
  extraResources:
    - from: .playwright-browsers/win64
      to: playwright-browsers/win64
      filter:
        - "**/*"
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
